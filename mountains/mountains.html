<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scottish Mountains Explorer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1923;
      color: #e0e0e0;
    }

    header {
      background: linear-gradient(135deg, #1a2a3a 0%, #2a3a4a 100%);
      padding: 20px 30px;
      border-bottom: 2px solid #3a506b;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #c9d6df;
      letter-spacing: 0.5px;
    }

    header p {
      color: #7a8a9a;
      font-size: 0.85rem;
      margin-top: 4px;
    }


    .banner {
      background: #1a3040;
      text-align: center;
      padding: 6px 20px;
      font-size: 0.78rem;
      color: #6a8a9a;
      border-bottom: 1px solid #2a3a4a;
    }

    .banner a {
      color: #5ba3d9;
      text-decoration: none;
    }

    .banner a:hover {
      text-decoration: underline;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: #1a2a3a;
      border-bottom: 2px solid #2a3a4a;
      padding: 0 20px;
    }

    .tab {
      padding: 12px 24px;
      cursor: pointer;
      color: #7a8a9a;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .tab:hover {
      color: #c9d6df;
      background: rgba(255, 255, 255, 0.03);
    }

    .tab.active {
      color: #5ba3d9;
      border-bottom-color: #5ba3d9;
    }

    .tab .count {
      background: #2a3a4a;
      color: #7a8a9a;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 0.75rem;
      margin-left: 6px;
    }

    .tab.active .count {
      background: #1a3a5a;
      color: #5ba3d9;
    }

    .controls {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: #152030;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 8px 14px;
      border: 1px solid #2a3a4a;
      border-radius: 6px;
      background: #1a2a3a;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }

    .search-box:focus {
      border-color: #5ba3d9;
    }

    .search-box::placeholder {
      color: #4a5a6a;
    }


    .stats {
      color: #5a6a7a;
      font-size: 0.8rem;
      margin-left: auto;
    }

    .table-wrap {
      overflow-x: auto;
      padding: 0 16px 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      background: #1a2a3a;
      color: #7a9ab5;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      padding: 10px 12px;
      text-align: left;
      position: sticky;
      top: 0;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid #2a3a4a;
      user-select: none;
    }

    thead th:hover {
      color: #5ba3d9;
    }

    thead th.sorted-asc::after {
      content: ' ▲';
      color: #5ba3d9;
    }

    thead th.sorted-desc::after {
      content: ' ▼';
      color: #5ba3d9;
    }

    tbody tr {
      border-bottom: 1px solid #1a2530;
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: rgba(91, 163, 217, 0.06);
    }

    tbody td {
      padding: 8px 12px;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody td:first-child {
      font-weight: 500;
      color: #c9d6df;
      white-space: normal;
    }

    tbody td.climbed-yes {
      color: #4caf50;
      font-weight: 600;
    }

    tbody td.climbed-no {
      color: #5a6a7a;
    }

    tbody td.rating {
      color: #f0c040;
    }

    tbody td.num {
      font-variant-numeric: tabular-nums;
    }

    .expand-cell {
      max-width: none;
      white-space: normal;
      word-break: break-word;
    }

    tr.expanded td {
      white-space: normal;
      max-width: none;
    }

    .no-data {
      color: #3a4a5a;
      font-style: italic;
    }


    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .pill-yes {
      background: #1a3a2a;
      color: #4caf50;
    }

    .pill-no {
      background: #2a2530;
      color: #7a6a8a;
    }

    .weather-btn {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 500;
      background: #1a2a3a;
      color: #5ba3d9;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .weather-btn:hover {
      background: #253d54;
      color: #7dc0f0;
    }

    .detail-panel {
      display: none;
      background: #152030;
      border: 1px solid #2a3a4a;
      border-radius: 8px;
      margin: 8px 16px;
      padding: 16px;
    }

    .detail-panel.open {
      display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }

    .detail-item label {
      display: block;
      color: #5a7a9a;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .detail-item span {
      color: #c9d6df;
      font-size: 0.85rem;
    }

    .nav {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      background: #1a2a3a;
      border-bottom: 1px solid #2a3a4a;
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .nav-title {
      color: #c9d6df;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-links a {
      color: #5ba3d9;
      text-decoration: none;
      font-size: 0.82rem;
      padding: 4px 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .nav-links a:hover {
      border-color: #5ba3d9;
    }

    .nav-links a.active {
      background: #1a3a5a;
      border-color: #5ba3d9;
    }

    @media (max-width: 768px) {
      header {
        padding: 8px 12px;
      }

      header p {
        font-size: 0.72rem;
        margin: 0;
      }

      .banner {
        font-size: 0.68rem;
        padding: 4px 10px;
      }

      .nav {
        padding: 8px 12px;
      }

      .nav-title {
        font-size: 0.75rem;
      }

      .nav-links a {
        font-size: 0.75rem;
        padding: 4px 8px;
      }

      .tabs {
        overflow-x: auto;
        padding: 0 8px;
        -webkit-overflow-scrolling: touch;
      }

      .tab {
        padding: 8px 12px;
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .tab .count {
        display: none;
      }

      .controls {
        flex-direction: column;
        padding: 8px 10px;
        gap: 6px;
      }

      .search-box {
        min-width: unset;
        width: 100%;
      }

      .stats {
        margin-left: 0;
      }

      .table-wrap {
        padding: 0 10px 12px;
      }

      table {
        font-size: 0.72rem;
      }

      thead th {
        padding: 6px 4px;
        font-size: 0.6rem;
      }

      tbody td {
        padding: 5px 4px;
        max-width: 110px;
      }

      /* Hide: 4=Time, 6=DriveTime, 7=Leave, 8=Climbed, 9=Section, 10=Area, 11=CarPark, 12=Toilets */
      td:nth-child(n+4):not(:nth-child(5)),
      th:nth-child(n+4):not(:nth-child(5)),
      td:nth-child(n+6),
      th:nth-child(n+6) {
        display: none;
      }

      .detail-panel {
        margin: 4px 8px;
        padding: 12px;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 6px 10px;
      }

      header p {
        display: none;
      }

      .nav-title {
        font-size: 0.7rem;
      }

      .nav-links a {
        font-size: 0.72rem;
        padding: 3px 6px;
      }

      .tab {
        padding: 6px 10px;
        font-size: 0.75rem;
      }

      table {
        font-size: 0.68rem;
      }

      thead th {
        padding: 5px 3px;
        font-size: 0.56rem;
      }

      tbody td {
        padding: 4px 3px;
        max-width: 90px;
      }

      /* Show only: Name, Rating, Height */
      td:nth-child(n+4),
      th:nth-child(n+4) {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="nav">
    <span class="nav-title">Scottish Mountains Explorer</span>
    <div class="nav-links">
      <a href="mountains.html" class="active">Mountains</a>
      <a href="map.html">Map</a>
      <a href="guide.html">Hiking Guide</a>
    </div>
  </div>

  <header style="margin-top: 48px;">
    <p>Munros, Corbetts, Donalds &amp; Grahams — with ratings, parking info &amp; trip planning from Edinburgh</p>
  </header>

  <div class="banner">Data sourced from <a href="https://www.walkhighlands.co.uk/"
      target="_blank">walkhighlands.co.uk</a> — Scotland's walking and hiking guide</div>
  <div class="tabs" id="tabs"></div>
  <div class="controls">
    <input class="search-box" id="search" type="text" placeholder="Search by name, area, section...">
    <span class="stats" id="stats"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    // Load data from csv files into DATA object
    async function loadData() {
      const data = {};
      const FILES = {
        'Munros': 'data/munros.csv',
        'Corbetts': 'data/corbett.csv',
        'Grahams': 'data/grahams.csv',
        'Donalds': 'data/donalds.csv',
      };

      const entries = Object.entries(FILES);

      const results = await Promise.all(
        entries.map(async ([label, path]) => {
          const res = await fetch(path);
          if (!res.ok) {
            throw new Error(`Failed to load ${label}: ${res.status}`);
          }

          const text = await res.text();
          const parsed = Papa.parse(text, {
            header: true,
            skipEmptyLines: true,
          });

          return [label, parsed.data];
        })
      );

      for (const [label, rows] of results) {
        data[label] = rows;
      }
      return data;
    }

    let DATA = null;
    loadData().then((data) => {
      DATA = data;
      init();
    }).catch(err => {
      console.error('Error loading data:', err);
      document.getElementById('stats').textContent = 'Failed to load data.';
    });

    const DISPLAY_COLS = [
      { key: 'Name', label: 'Name', width: '200px' },
      { key: 'Users_Rating', label: 'Rating', type: 'num' },
      { key: 'Height_m', label: 'Height (m)', type: 'num' },
      { key: 'Time_Estimate', label: 'Climb Time Est.' },
      { key: 'Distance_From_EDI_miles', label: 'Drive Dist (mi)', type: 'num' },
      { key: 'Drive_Time_hrs', label: 'Drive Time (h)', type: 'num' },
      { key: 'Suggested_Leaving_Time', label: 'Leave EDI Before' },
      { key: 'Is_Climbed', label: 'Climbed' },
      { key: 'Section_Name', label: 'Section' },
      { key: 'Area_Name', label: 'Area' },
      { key: 'Car_Park', label: 'Car Park' },
      { key: 'Toilets_Info', label: 'Toilets' },
      { key: 'Weather', label: 'Weather', type: 'weather' },
    ];

    let currentTab = 'Munros';
    let sortCol = 'Users_Rating';
    let sortDir = 'desc';
    let expandedRow = -1;

    function init() {
      const tabs = document.getElementById('tabs');
      for (const [label, rows] of Object.entries(DATA)) {
        const tab = document.createElement('div');
        tab.className = 'tab' + (label === currentTab ? ' active' : '');
        tab.innerHTML = label + '<span class="count">' + rows.length + '</span>';
        tab.onclick = () => { currentTab = label; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); expandedRow = -1; render(); };
        tabs.appendChild(tab);
      }
      renderHeader();
      render();
      document.getElementById('search').addEventListener('input', () => { expandedRow = -1; render(); });
    }

    function renderHeader() {
      const thead = document.getElementById('thead');
      thead.innerHTML = '<tr>' + DISPLAY_COLS.map(c => {
        const cls = c.key === sortCol ? ('sorted-' + sortDir) : '';
        return '<th class="' + cls + '" onclick="sortBy(\'' + c.key + '\')">' + c.label + '</th>';
      }).join('') + '</tr>';
    }

    function sortBy(col) {
      if (sortCol === col) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
      else { sortCol = col; sortDir = 'asc'; }
      expandedRow = -1;
      renderHeader();
      render();
    }

    function render() {
      const ds = DATA[currentTab];
      const query = document.getElementById('search').value.toLowerCase();
      let rows = ds.filter(r => {
        if (query) {
          const text = Object.values(r).join(' ').toLowerCase();
          if (!text.includes(query)) return false;
        }
        return true;
      });

      rows.sort((a, b) => {
        let va = a[sortCol] || '', vb = b[sortCol] || '';
        const col = DISPLAY_COLS.find(c => c.key === sortCol);
        if (col && col.type === 'num') {
          va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
        } else {
          va = va.toLowerCase(); vb = vb.toLowerCase();
        }
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = rows.map((r, i) => {
        const isExpanded = i === expandedRow;
        const cells = DISPLAY_COLS.map(c => {
          let v = r[c.key] || '';
          let cls = '';
          v = v.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          if (c.type === 'weather') {
            const pc = r['PostCode'] || '';
            if (pc) {
              v = '<a href="https://www.bbc.co.uk/weather/' + pc.toLowerCase() + '" target="_blank" rel="noopener" class="weather-btn" onclick="event.stopPropagation()">' + pc + '</a>';
            } else {
              v = '\u2014'; cls = 'no-data';
            }
          } else if (c.key === 'Is_Climbed') {
            cls = v === 'Yes' ? 'climbed-yes' : 'climbed-no';
            v = v === 'Yes' ? '<span class="pill pill-yes">Yes</span>' : '<span class="pill pill-no">No</span>';
          } else if (c.key === 'Users_Rating' && v) {
            cls = 'rating num';
            v = '\u2605 ' + v;
          } else if (c.type === 'num') {
            cls = 'num';
          } else if (!v) {
            v = '\u2014'; cls = 'no-data';
          }
          if (isExpanded && (c.key === 'Car_Park' || c.key === 'Toilets_Info')) cls += ' expand-cell';
          return '<td class="' + cls + '">' + v + '</td>';
        }).join('');
        const trCls = isExpanded ? 'expanded' : '';
        return '<tr class="' + trCls + '" onclick="toggleRow(' + i + ')" style="cursor:pointer">' + cells + '</tr>' +
          (isExpanded ? renderDetail(r) : '');
      }).join('');

      document.getElementById('stats').textContent = rows.length + ' of ' + ds.length + ' mountains';
    }

    function toggleRow(i) {
      expandedRow = expandedRow === i ? -1 : i;
      render();
    }

    function renderDetail(r) {
      const allCols = Object.keys(r);
      const items = allCols.map(key => {
        const v = r[key] || '';
        if (!v) return '';
        if (key === 'PostCode') {
          return '<div class="detail-item"><label>Weather</label><span><a href="https://www.bbc.co.uk/weather/' + v.toLowerCase() + '" target="_blank" rel="noopener" class="weather-btn">' + v + '</a></span></div>';
        }
        return '<div class="detail-item"><label>' + key.replace(/_/g, ' ') + '</label><span>' + v + '</span></div>';
      }).filter(Boolean).join('');
      return '<tr><td colspan="' + DISPLAY_COLS.length + '"><div class="detail-panel open"><div class="detail-grid">' + items + '</div></div></td></tr>';
    }
  </script>
</body>

</html>
