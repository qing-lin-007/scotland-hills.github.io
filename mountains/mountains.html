<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scottish Mountains Explorer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1923;
      color: #e0e0e0;
    }

    header {
      background: linear-gradient(135deg, #1a2a3a 0%, #2a3a4a 100%);
      padding: 20px 30px;
      border-bottom: 2px solid #3a506b;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #c9d6df;
      letter-spacing: 0.5px;
    }

    header p {
      color: #7a8a9a;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .edit-btn-cell {
      text-align: center;
      width: 60px;
    }

    .edit-row-btn {
      padding: 3px 10px;
      border: 1px solid #3a506b;
      border-radius: 4px;
      background: #1a2a3a;
      color: #7a9ab5;
      cursor: pointer;
      font-size: 0.72rem;
      transition: all 0.15s;
    }

    .edit-row-btn:hover {
      border-color: #5ba3d9;
      color: #5ba3d9;
    }

    .edit-row-btn.saving {
      border-color: #4caf50;
      color: #4caf50;
    }

    tr.row-editing {
      background: rgba(91, 163, 217, 0.08);
    }

    tr.row-editing td {
      white-space: normal;
      max-width: none;
    }

    .edit-input {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #3a506b;
      border-radius: 4px;
      background: #1a2a3a;
      color: #e0e0e0;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }

    .edit-input:focus {
      border-color: #5ba3d9;
    }

    @keyframes flash-save {
      0% {
        background: rgba(76, 175, 80, 0.2);
      }

      100% {
        background: transparent;
      }
    }

    tr.just-saved td {
      animation: flash-save 1s ease-out;
    }

    .banner {
      background: #1a3040;
      text-align: center;
      padding: 6px 20px;
      font-size: 0.78rem;
      color: #6a8a9a;
      border-bottom: 1px solid #2a3a4a;
    }

    .banner a {
      color: #5ba3d9;
      text-decoration: none;
    }

    .banner a:hover {
      text-decoration: underline;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: #1a2a3a;
      border-bottom: 2px solid #2a3a4a;
      padding: 0 20px;
    }

    .tab {
      padding: 12px 24px;
      cursor: pointer;
      color: #7a8a9a;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .tab:hover {
      color: #c9d6df;
      background: rgba(255, 255, 255, 0.03);
    }

    .tab.active {
      color: #5ba3d9;
      border-bottom-color: #5ba3d9;
    }

    .tab .count {
      background: #2a3a4a;
      color: #7a8a9a;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 0.75rem;
      margin-left: 6px;
    }

    .tab.active .count {
      background: #1a3a5a;
      color: #5ba3d9;
    }

    .controls {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: #152030;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 8px 14px;
      border: 1px solid #2a3a4a;
      border-radius: 6px;
      background: #1a2a3a;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }

    .search-box:focus {
      border-color: #5ba3d9;
    }

    .search-box::placeholder {
      color: #4a5a6a;
    }

    .filter-btn {
      padding: 7px 14px;
      border: 1px solid #2a3a4a;
      border-radius: 6px;
      background: #1a2a3a;
      color: #7a8a9a;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }

    .filter-btn:hover {
      border-color: #5ba3d9;
      color: #c9d6df;
    }

    .filter-btn.active {
      background: #1a3a5a;
      border-color: #5ba3d9;
      color: #5ba3d9;
    }

    .stats {
      color: #5a6a7a;
      font-size: 0.8rem;
      margin-left: auto;
    }

    .table-wrap {
      overflow-x: auto;
      padding: 0 16px 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      background: #1a2a3a;
      color: #7a9ab5;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      padding: 10px 12px;
      text-align: left;
      position: sticky;
      top: 0;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid #2a3a4a;
      user-select: none;
    }

    thead th:hover {
      color: #5ba3d9;
    }

    thead th.sorted-asc::after {
      content: ' ▲';
      color: #5ba3d9;
    }

    thead th.sorted-desc::after {
      content: ' ▼';
      color: #5ba3d9;
    }

    tbody tr {
      border-bottom: 1px solid #1a2530;
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: rgba(91, 163, 217, 0.06);
    }

    tbody td {
      padding: 8px 12px;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody td:first-child {
      font-weight: 500;
      color: #c9d6df;
      white-space: normal;
    }

    tbody td.climbed-yes {
      color: #4caf50;
      font-weight: 600;
    }

    tbody td.climbed-no {
      color: #5a6a7a;
    }

    tbody td.rating {
      color: #f0c040;
    }

    tbody td.num {
      font-variant-numeric: tabular-nums;
    }

    .expand-cell {
      max-width: none;
      white-space: normal;
      word-break: break-word;
    }

    tr.expanded td {
      white-space: normal;
      max-width: none;
    }

    .no-data {
      color: #3a4a5a;
      font-style: italic;
    }

    td[contenteditable="true"] {
      outline: 2px solid #5ba3d9;
      background: #1a2a3a;
      cursor: text;
      white-space: normal;
      max-width: none;
      border-radius: 3px;
    }

    td.editing {
      outline: 2px solid #f0c040;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .pill-yes {
      background: #1a3a2a;
      color: #4caf50;
    }

    .pill-no {
      background: #2a2530;
      color: #7a6a8a;
    }

    .detail-panel {
      display: none;
      background: #152030;
      border: 1px solid #2a3a4a;
      border-radius: 8px;
      margin: 8px 16px;
      padding: 16px;
    }

    .detail-panel.open {
      display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }

    .detail-item label {
      display: block;
      color: #5a7a9a;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .detail-item span {
      color: #c9d6df;
      font-size: 0.85rem;
    }

    .nav {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      background: #1a2a3a;
      border-bottom: 1px solid #2a3a4a;
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .nav-title {
      color: #c9d6df;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-links a {
      color: #5ba3d9;
      text-decoration: none;
      font-size: 0.82rem;
      padding: 4px 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .nav-links a:hover {
      border-color: #5ba3d9;
    }

    .nav-links a.active {
      background: #1a3a5a;
      border-color: #5ba3d9;
    }

    @media (max-width: 768px) {
      header {
        padding: 14px 16px;
      }

      header h1 {
        font-size: 1.2rem;
      }

      header p {
        font-size: 0.75rem;
      }

      .tabs {
        overflow-x: auto;
        padding: 0 8px;
        -webkit-overflow-scrolling: touch;
      }

      .tab {
        padding: 10px 14px;
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .tab .count {
        display: none;
      }

      .controls {
        flex-direction: column;
        padding: 10px 12px;
        gap: 8px;
      }

      .controls .filter-row {
        display: flex;
        gap: 8px;
        width: 100%;
      }

      .search-box {
        min-width: unset;
        width: 100%;
      }

      .stats {
        margin-left: 0;
      }

      .table-wrap {
        padding: 0 4px 16px;
      }

      table {
        font-size: 0.72rem;
      }

      thead th {
        padding: 8px 6px;
        font-size: 0.62rem;
      }

      tbody td {
        padding: 6px;
        max-width: 120px;
      }

      /* Hide less important columns on mobile */
      td:nth-child(6),
      th:nth-child(6),
      td:nth-child(8),
      th:nth-child(8),
      td:nth-child(9),
      th:nth-child(9),
      td:nth-child(10),
      th:nth-child(10),
      td:nth-child(11),
      th:nth-child(11) {
        display: none;
      }

      .detail-panel {
        margin: 4px 8px;
        padding: 12px;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .nav {
        padding: 8px 12px;
      }

      .nav-title {
        font-size: 0.75rem;
      }

      .nav-links a {
        font-size: 0.75rem;
        padding: 4px 8px;
      }
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 1rem;
      }

      header p {
        display: none;
      }

      .nav-title {
        display: none;
      }

      .nav-links a {
        font-size: 0.72rem;
        padding: 3px 6px;
      }

      .banner {
        font-size: 0.7rem;
        padding: 5px 10px;
      }

      .tab {
        padding: 8px 10px;
        font-size: 0.75rem;
      }

      table {
        font-size: 0.68rem;
      }

      thead th {
        padding: 6px 4px;
        font-size: 0.58rem;
      }

      tbody td {
        padding: 5px 4px;
        max-width: 90px;
      }

      /* On very small screens, show only Name, Rating, Height, Climbed */
      td:nth-child(4),
      th:nth-child(4),
      td:nth-child(5),
      th:nth-child(5),
      td:nth-child(7),
      th:nth-child(7) {
        display: none;
      }
    }
  </style>
</head>

  </div>
  <div class="table-wrap">

      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>

    const DISPLAY_COLS = [
      { key: 'Name', label: 'Name', width: '200px' },
      { key: 'Users_Rating', label: 'Rating', type: 'num' },
      { key: 'Height_m', label: 'Height (m)', type: 'num' },
      { key: 'Time_Estimate', label: 'Climb Time Est.' },
      { key: 'Distance_From_EDI_miles', label: 'Drive Dist (mi)', type: 'num' },
      { key: 'Drive_Time_hrs', label: 'Drive Time (h)', type: 'num' },
      { key: 'Suggested_Leaving_Time', label: 'Leave EDI Before' },
      { key: 'Is_Climbed', label: 'Climbed' },
      { key: 'Section_Name', label: 'Section' },
      { key: 'Area_Name', label: 'Area' },
      { key: 'Car_Park', label: 'Car Park' },
      { key: 'Toilets_Info', label: 'Toilets' },
    ];

    let currentTab = 'Munros';
    let sortCol = 'Users_Rating';
    let sortDir = 'desc';
    let filters = { climbed: false, unclimbed: false };
    let expandedRow = -1;
    let editingRowIdx = -1;
    let editingTab = '';

    function init() {
      const tabs = document.getElementById('tabs');
      for (const [label, ds] of Object.entries(DATA)) {
        const tab = document.createElement('div');
        tab.className = 'tab' + (label === currentTab ? ' active' : '');
        tab.innerHTML = label + '<span class="count">' + ds.rows.length + '</span>';
        tab.onclick = () => { currentTab = label; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); expandedRow = -1; render(); };
        tabs.appendChild(tab);
      }
      renderHeader();
      render();
      document.getElementById('search').addEventListener('input', () => { expandedRow = -1; render(); });
    }

    function renderHeader() {
      const thead = document.getElementById('thead');
      thead.innerHTML = '<tr>' + DISPLAY_COLS.map(c => {
        const cls = c.key === sortCol ? ('sorted-' + sortDir) : '';
        return '<th class="' + cls + '" onclick="sortBy(\'' + c.key + '\')">' + c.label + '</th>';
      }).join('') + '</tr>';
    }

    function sortBy(col) {
      if (sortCol === col) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
      else { sortCol = col; sortDir = 'asc'; }
      expandedRow = -1;
      renderHeader();
      render();
    }

    function toggleFilter(f) {
      filters[f] = !filters[f];
      document.getElementById('btn-' + f).classList.toggle('active');
      expandedRow = -1;
      render();
    }

    function render() {
      const ds = DATA[currentTab];
      const query = document.getElementById('search').value.toLowerCase();
      let rows = ds.rows.filter(r => {
        if (query) {
          const text = Object.values(r).join(' ').toLowerCase();
          if (!text.includes(query)) return false;
        }
        if (filters.climbed && r.Is_Climbed !== 'Yes') return false;
        if (filters.unclimbed && r.Is_Climbed !== 'No') return false;
        return true;
      });

      rows.sort((a, b) => {
        let va = a[sortCol] || '', vb = b[sortCol] || '';
        const col = DISPLAY_COLS.find(c => c.key === sortCol);
        if (col && col.type === 'num') {
          va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
        } else {
          va = va.toLowerCase(); vb = vb.toLowerCase();
        }
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = rows.map((r, i) => {
        const isExpanded = i === expandedRow;
        const origIdx = ds.rows.findIndex(orig => orig.Name === r.Name && orig.Height_m === r.Height_m);
        const isEditingThis = editingRowIdx === origIdx && editingTab === currentTab;
        const cells = DISPLAY_COLS.map(c => {
          let v = r[c.key] || '';
          let cls = '';
          if (isEditingThis) {
            const escaped = v.replace(/"/g, '&quot;');
            return '<td><input class="edit-input" data-key="' + c.key + '" value="' + escaped + '" onclick="event.stopPropagation()"></td>';
          }
          if (c.key === 'Is_Climbed') {
            cls = v === 'Yes' ? 'climbed-yes' : 'climbed-no';
            v = v === 'Yes' ? '<span class="pill pill-yes">Yes</span>' : '<span class="pill pill-no">No</span>';
          } else if (c.key === 'Users_Rating' && v) {
            cls = 'rating num';
            v = '\u2605 ' + v;
          } else if (c.type === 'num') {
            cls = 'num';
          } else if (!v) {
            v = '\u2014'; cls = 'no-data';
          }
          if (isExpanded && (c.key === 'Car_Park' || c.key === 'Toilets_Info')) cls += ' expand-cell';
          return '<td class="' + cls + '" ondblclick="editCell(event, \'' + currentTab + '\',' + origIdx + ',\'' + c.key + '\')">' + v + '</td>';
        }).join('');
        const trCls = isExpanded ? 'expanded' : '';
        return '<tr class="' + trCls + '" onclick="toggleRow(' + i + ')" style="cursor:pointer">' + cells + '</tr>' +
          (isExpanded ? renderDetail(r) : '');
      }).join('');

      document.getElementById('stats').textContent = rows.length + ' of ' + ds.rows.length + ' mountains';
    }

    function toggleRow(i) {
      if (editingRowIdx >= 0) return;
      expandedRow = expandedRow === i ? -1 : i;
      render();
    }

    function renderDetail(r) {
      const allCols = DATA[currentTab].headers;
      const items = allCols.map(key => {
        const v = r[key] || '';
        if (!v) return '';
        return '<div class="detail-item"><label>' + key.replace(/_/g, ' ') + '</label><span>' + v + '</span></div>';
      }).filter(Boolean).join('');
      return '<tr><td colspan="' + DISPLAY_COLS.length + '"><div class="detail-panel open"><div class="detail-grid">' + items + '</div></div></td></tr>';
    }

    function editCell(event, tab, rowIdx, key) {
      event.stopPropagation();
      if (editingRowIdx >= 0) return;
      const td = event.target.closest('td');
      if (td.getAttribute('contenteditable') === 'true') return;

      editingRowIdx = rowIdx;
      editingTab = tab;
      const row = DATA[tab].rows[rowIdx];
      const oldVal = row[key] || '';

      td.textContent = oldVal;
      td.setAttribute('contenteditable', 'true');
      td.classList.add('editing');
      td.focus();

      const range = document.createRange();
      range.selectNodeContents(td);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      function save() {
        const newVal = td.textContent.trim();
        td.removeAttribute('contenteditable');
        td.classList.remove('editing');
        td.removeEventListener('blur', save);
        td.removeEventListener('keydown', onKey);
        if (newVal !== oldVal) {
          row[key] = newVal;
          hasUnsaved = true;
          updateSaveBtn();
        }
        editingRowIdx = -1;
        editingTab = '';
        render();
      }

      function onKey(e) {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') { td.textContent = oldVal; save(); }
      }

      td.addEventListener('blur', save);
      td.addEventListener('keydown', onKey);
    }

    let hasUnsaved = false;
    function updateSaveBtn() {
      const btn = document.getElementById('btn-save');
      if (btn) btn.style.display = hasUnsaved ? 'inline-block' : 'none';
    }

    function exportCSV(tab) {
      const ds = DATA[tab];
      const headers = ds.headers;
      const csvRows = [headers.join(',')];
      for (const r of ds.rows) {
        const vals = headers.map(h => {
          const v = r[h] || '';
          return v.includes(',') || v.includes('"') || v.includes('\n') ? '"' + v.replace(/"/g, '""') + '"' : v;
        });
        csvRows.push(vals.join(','));
      }
      const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = tab.toLowerCase() + '.csv';
      a.click();
    }

    function saveToFiles() {
      for (const [tab, ds] of Object.entries(DATA)) {
        const fname = { Munros: 'munros.csv', Corbetts: 'corbett.csv', Donalds: 'donalds.csv', Grahams: 'grahams.csv' }[tab];
        const headers = ds.headers;
        const csvRows = [headers.join(',')];
        for (const r of ds.rows) {
          const vals = headers.map(h => {
            const v = r[h] || '';
            return v.includes(',') || v.includes('"') || v.includes('\n') ? '"' + v.replace(/"/g, '""') + '"' : v;
          });
          csvRows.push(vals.join(','));
        }
        const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fname;
        a.click();
      }
      hasUnsaved = false;
      updateSaveBtn();
    }

    init();
  </script>
