<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mountain Map — Scottish Mountains Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1923; color: #e0e0e0; }

    .nav { position: fixed; top: 0; right: 0; left: 0; background: #1a2a3a; border-bottom: 1px solid #2a3a4a; padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
    .nav-title { color: #c9d6df; font-size: 1.1rem; font-weight: 600; }
    .nav-links { display: flex; gap: 16px; }
    .nav-links a { color: #5ba3d9; text-decoration: none; font-size: 0.82rem; padding: 4px 12px; border: 1px solid transparent; border-radius: 4px; transition: all 0.15s; }
    .nav-links a:hover { border-color: #5ba3d9; }
    .nav-links a.active { background: #1a3a5a; border-color: #5ba3d9; }

    .banner { background: #1a3040; text-align: center; padding: 6px 20px; font-size: 0.78rem; color: #6a8a9a; border-bottom: 1px solid #2a3a4a; margin-top: 48px; }
    .banner a { color: #5ba3d9; text-decoration: none; }
    .banner a:hover { text-decoration: underline; }

    .map-container { width: 100%; height: calc(100vh - 90px); }
    .map-container iframe { width: 100%; height: 100%; border: none; }

    @media (max-width: 768px) {
      .nav { padding: 8px 12px; }
      .nav-title { font-size: 0.75rem; }
      .nav-links a { font-size: 0.75rem; padding: 4px 8px; }
    }

    @media (max-width: 480px) {
      .nav-title { font-size: 0.7rem; }
      .nav-links a { font-size: 0.72rem; padding: 3px 6px; }
    }
  </style>
</head>
<body>

  <div class="nav">
    <span class="nav-title">Scottish Mountains Explorer</span>
    <div class="nav-links">
      <a href="mountains.html">Mountains</a>
      <a href="map.html" class="active">Map</a>
      <a href="guide.html">Hiking Guide</a>
    </div>
  </div>

  <div class="banner">Data sourced from <a href="https://www.walkhighlands.co.uk/" target="_blank">walkhighlands.co.uk</a> — Scotland's walking and hiking guide</div>

  <div class="map-container">
    <iframe src="https://www.google.com/maps/d/embed?mid=1exHSdQk3W_NTbT0Ca0T0VQMqKVPDCEI&ehbc=2E312F" title="Scottish Mountains Map">Your browser does not support iframes.</iframe>
  </div>

</body>
</html>
